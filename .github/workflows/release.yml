name: Build VendoZ Release

on:
  push:
    branches: [ main ]
    paths:
      - 'vendoz/**'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Version mise à jour pour Node 24

      - name: Generate Version and Build
        run: |
          VERSION="1.0.$(date +'%Y%m%d%H%M')"
          sed -i "s/version=\"[^\"]*\"/version=\"$VERSION\"/" vendoz/paquet.xml
          mkdir -p archives
          zip -r "archives/vendoz_latest.zip" vendoz
          
          cat <<EOF > plugins.xml
          <?xml version="1.0" encoding="utf-8"?>
          <plugins>
              <plugin>
                  <nom>VendoZ Distribution e-Commerce</nom>
                  <prefix>vendoz</prefix>
                  <version>$VERSION</version>
                  <etat>stable</etat>
                  <url_archive>https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/archives/vendoz_latest.zip</url_archive>
              </plugin>
          </plugins>
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "VendoZ Bot"
          git config --global user.email "bot@vendoz.com"
          git add archives/vendoz_latest.zip plugins.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "VendoZ Release $VERSION" && git push)
